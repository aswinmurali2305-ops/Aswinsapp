<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aswin's Money Manager</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #e5e7eb; }

.dark { background-color: #000 !important; color: white; }

.dark .bg-white { background-color: #1f2937 !important; }
.dark .bg-gray-200 { background-color: #374151 !important; }

.page { display: none; }
.active { display: block; }
</style>
</head>

<body id="body">

<!-- HEADER -->
<div class="flex justify-between p-3 bg-blue-600 text-white">
<button onclick="location.reload()">🔄</button>
<h1 class="font-bold">Aswin's Money Manager</h1>
<button onclick="toggleDark()">🌙</button>
</div>

<!-- NAV -->
<div class="flex justify-around bg-gray-300 p-2 text-sm">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('log')">Log</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('calendar')">Calendar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active p-3">

<div class="grid grid-cols-2 gap-2 mb-3">
<div class="bg-white p-2 rounded">Monthly Services: <span id="monthCount">0</span></div>
<div class="bg-white p-2 rounded">Weekly Services: <span id="weekCount">0</span></div>
<div class="bg-white p-2 rounded">Money Received: $<span id="received">0</span></div>
<div class="bg-white p-2 rounded">Pending: $<span id="pending">0</span></div>
</div>

<div class="bg-white p-3 rounded mb-3">
<input id="name" placeholder="Customer Name" class="border p-1 w-full mb-2">
<input type="date" id="date" class="border p-1 w-full mb-2">
<input type="time" id="time" class="border p-1 w-full mb-2">
<button onclick="addService()" class="bg-blue-500 text-white px-3 py-1 rounded">Add</button>
</div>

<div class="flex gap-2">
<button onclick="exportExcel()" class="bg-green-500 text-white p-2 rounded w-full">Export Excel</button>
<button onclick="exportPDF()" class="bg-red-500 text-white p-2 rounded w-full">Export PDF</button>
</div>

</div>

<!-- LOG PAGE -->
<div id="log" class="page p-3">
<h2 class="font-bold mb-2">Log History</h2>

<input type="date" id="startDate" class="border p-1 mb-2">
<input type="date" id="endDate" class="border p-1 mb-2">
<button onclick="filterLogs()" class="bg-blue-500 text-white px-2 py-1">Filter</button>

<div id="logList"></div>
</div>

<!-- CLIENT PAGE -->
<div id="clients" class="page p-3">

<h2 class="font-bold mb-2">Clients</h2>

<input type="date" id="clientStart" class="border p-1 mb-2">
<input type="date" id="clientEnd" class="border p-1 mb-2">
<button onclick="filterClients()" class="bg-blue-500 text-white px-2 py-1">Filter</button>

<div id="clientList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="page p-3">
<input type="date" id="calDate" onchange="showCalendarLogs()">
<div id="calLogs"></div>
</div>

<script>

let logs = JSON.parse(localStorage.getItem("logs")) || [];

function save(){
localStorage.setItem("logs", JSON.stringify(logs));
updateStats();
renderLogs();
renderClients();
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function normalizeName(name){
return name.trim().toLowerCase();
}

function formatName(name){
return name.trim().charAt(0).toUpperCase() + name.trim().slice(1).toLowerCase();
}

function addService(){
let name = formatName(document.getElementById("name").value);
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if(!name || !date || !time) return alert("Fill all fields");

logs.push({name,date,time,cost:15,paid:false});
save();
}

function updateStats(){
let now = new Date();
let month = now.getMonth();
let weekStart = new Date(now);
weekStart.setDate(now.getDate()-now.getDay()+1);

let monthCount=0, weekCount=0, received=0, pending=0;

logs.forEach(l=>{
let d = new Date(l.date);

if(d.getMonth()===month) monthCount++;
if(d>=weekStart) weekCount++;

if(l.paid) received+=15;
else pending+=15;
});

document.getElementById("monthCount").innerText = monthCount;
document.getElementById("weekCount").innerText = weekCount;
document.getElementById("received").innerText = received;
document.getElementById("pending").innerText = pending;
}

function renderLogs(list = logs){
let div = document.getElementById("logList");
div.innerHTML = "";

list.forEach((l,i)=>{
div.innerHTML += `
<div class="bg-white p-2 mt-2 rounded">
${l.name} - ${l.date} ${formatTime(l.time)}
<div class="flex gap-2 mt-1">
<button onclick="editLog(${i})" class="bg-blue-500 text-white px-2">Edit</button>
<button onclick="deleteLog(${i})" class="bg-red-500 text-white px-2">Delete</button>
</div>
</div>`;
});
}

function deleteLog(i){
logs.splice(i,1);
save();
}

function editLog(i){
let newName = prompt("Edit Name", logs[i].name);
if(newName) logs[i].name = formatName(newName);
save();
}

function filterLogs(){
let s = document.getElementById("startDate").value;
let e = document.getElementById("endDate").value;

let filtered = logs.filter(l=>(!s||l.date>=s)&&(!e||l.date<=e));
renderLogs(filtered);
}

function renderClients(list = logs){

let clientMap = {};

list.forEach(l=>{
let key = normalizeName(l.name);

if(!clientMap[key]){
clientMap[key] = {
name: l.name,
pending: 0
};
}

if(!l.paid) clientMap[key].pending += 15;
});

// convert to array and sort by pending desc
let sorted = Object.values(clientMap).sort((a,b)=>b.pending - a.pending);

let div = document.getElementById("clientList");
div.innerHTML = "";

sorted.forEach(c=>{
div.innerHTML += `
<div onclick="openClient('${c.name}')" class="bg-white p-2 mt-2 rounded flex justify-between">
<span>${c.name}</span>
<span class="text-red-500 font-bold">$${c.pending}</span>
</div>`;
});

}

function filterClients(){
let s = document.getElementById("clientStart").value;
let e = document.getElementById("clientEnd").value;

let filtered = logs.filter(l=>(!s||l.date>=s)&&(!e||l.date<=e));
renderClients(filtered);
}

function openClient(name){

let data = logs.map((l,index)=>({...l,index}))
.filter(l=>normalizeName(l.name)===normalizeName(name));

let html = `<button onclick="renderClients()" class="bg-gray-500 text-white px-2 py-1 mb-2">⬅ Back</button>`;
html += `<h3 class="font-bold">${name}</h3>`;

data.forEach(l=>{
html += `
<div class="bg-gray-200 p-2 mt-1">
${l.date} ${formatTime(l.time)}
<div class="flex gap-2 mt-1">
<button onclick="editLog(${l.index})" class="bg-blue-500 text-white px-2">Edit</button>
<button onclick="markPaid(${l.index})" class="bg-green-500 text-white px-2">Paid</button>
<button onclick="deleteLog(${l.index})" class="bg-red-500 text-white px-2">Delete</button>
</div>
</div>`;
});

html += `<button onclick="share('${name}')" class="bg-blue-500 text-white mt-2 p-2 w-full">Share via WhatsApp</button>`;

document.getElementById("clientList").innerHTML = html;
}

function markPaid(i){
logs[i].paid=true;
save();
}

function share(name){
let data = logs.filter(l=>normalizeName(l.name)===normalizeName(name) && !l.paid);
let total = data.length * 15;

let msg = `Hi ${name},%0A%0APending services:%0A`;

data.forEach(l=>{
msg += `${l.date} ${formatTime(l.time)}%0A`;
});

msg += `%0ATotal Due: $${total}%0APlease make the payment and share screenshot.`;

window.open(`https://wa.me/?text=${msg}`,"_blank");
}

function showCalendarLogs(){
let date = document.getElementById("calDate").value;
let list = logs.filter(l=>l.date===date);

let div = document.getElementById("calLogs");
div.innerHTML = "";

list.forEach(l=>{
div.innerHTML += `<div>${l.name} - ${formatTime(l.time)}</div>`;
});
}

function formatTime(t){
let [h,m] = t.split(":");
h = Number(h);
let ampm = h>=12?"PM":"AM";
h = h%12 || 12;
return `${h}:${m} ${ampm}`;
}

function exportExcel(){
let csv = "Name,Date,Time,Status\n";
logs.forEach(l=>{
csv += `${l.name},${l.date},${l.time},${l.paid?"Paid":"Pending"}\n`;
});
let blob = new Blob([csv]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "logs.csv";
a.click();
}

function exportPDF(){
window.print();
}

updateStats();
renderLogs();
renderClients();

</script>

</body>
</html>
